version: 0.1.4
args:
  message: "Hello Proceed"
  tmp: /tmp
prototype:
  user: self
  volumes:
    $tmp/ignored: /ignored
steps:
  - name: write-message
    image: alpine:latest
    volumes:
      $tmp/shared: /shared
    command: ["/bin/sh", "-c", "echo '$message' > /shared/proceed_smoke_test.txt"]
  - name: read-message
    image: alpine:latest
    volumes:
      $tmp/shared: {"bind": /shared, "mode": "ro"}
    command: ["cat", "/shared/proceed_smoke_test.txt"]
