version: 0.0.12
args:
  message: "Hello Proceed"
prototype:
  user: self
  volumes:
    /tmp: /tmp
steps:
  - name: write-message
    image: alpine:latest
    command: ["/bin/sh", "-c", "echo '$message' > /tmp/proceed_smoke_test.txt"]
  - name: read-message
    image: alpine:latest
    command: ["cat", "/tmp/proceed_smoke_test.txt"]
